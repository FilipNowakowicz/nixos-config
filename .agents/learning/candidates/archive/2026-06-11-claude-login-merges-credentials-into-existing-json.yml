evidence: [pr-#180, hosts/gcp-agent/secrets/claude-credentials.enc, "session-2026-06-11: head -c 30 ~/.claude/.credentials.json after login still showed {\"_placeholder\":\"Rep... -> looked like login hadn't written creds, but `cat` of the full 574-byte file showed both _placeholder AND a real claudeAiOauth key with live accessToken/refreshToken", "agent then printed full file via cat to debug, leaking live OAuth access+refresh tokens into chat"]
observation: when hosts/gcp-agent/secrets/claude-credentials.enc is provisioned with placeholder JSON `{"_placeholder":"..."}` and the user later runs `claude` to log in, the CLI does an in-place JSON merge (adds `claudeAiOauth` alongside the existing top-level keys) rather than replacing the file wholesale. A prefix check (`head -c N`) on the merged file still shows the original `_placeholder` key first and looks unchanged, which is misleading. The only safe way to confirm real credentials landed is a structural check (`jq 'has("claudeAiOauth")'` or `jq 'keys'`), never `cat`/`head` of the whole file — doing so prints live OAuth access+refresh tokens (scopes: inference, file_upload, mcp_servers, profile, sessions) into the agent transcript.
proposed_upgrade: Update hosts/gcp-agent/CLAUDE.md step 7 to (a) note the merge-not-replace behavior so a prefix check isn't taken as "login didn't work", (b) prescribe `ssh ... 'jq -c "keys" ~/.claude/.credentials.json'` (or `has("claudeAiOauth")`) for verification, explicitly warning never to cat/print the file, and (c) note the capture step should also `jq 'del(._placeholder)'` to drop the leftover placeholder key before re-encrypting (done ad hoc in #180).
type: workflow-gotcha
