schema: learning-candidate/v1
id: 2026-06-14-agent-run-issue-cost-scales-with-turns
date: 2026-06-14
expires: 2026-09-12
status: superseded

route: implement-fix
best_form: test

evidence: ["telemetry across 8 sessions with .session in .agents/state/outcomes/*.json totals $13.53 and 25.9M cache_read_input_tokens; per-session cost tracks turn count: 2026-06-13T11:30:06Z-issue-259.log = 23 turns / 0.9M cache-read / $0.57 vs 2026-06-13T18:24:25Z-issue-191.log = 77 turns / 7.2M cache-read / $3.42; for #191 cache reads are ~63% of cost", "CORROBORATION 2026-06-14 (first real dispatch of #259 with AGENT_MAX_TURNS=60 on sonnet): hit the cap at 61 turns / 5.18M cache-read / 47k output / $2.96 / 813s (near the 900s timeout); 20 of 38 Bash calls were nix-eval/validate.sh/treefmt re-runs whose verbose output bloated the re-read transcript -- the predicted risk below materialized: the cap truncated COMPLETE work mid-session"]
observation: "issue-loop spend is dominated by cache-read tokens that grow super-linearly with turn count (every turn re-reads the whole growing transcript), so cost is a function of turns x accumulated-context; fat nix build/eval logs dumped into a tool result are then re-read on every later turn, and the AGENT_INNER_TIMEOUT_SECONDS bound is a time cap that does not bound turns. nix-modules/invariant work is the worst case: it iterates flake-eval + treefmt many times, and each re-run's output compounds the per-turn cost, so a flat cap that is safe for docs is too low here."
proposed_upgrade: "the durable fix is to keep per-turn context small so a LOW cap does not truncate real work: route noisy build/explore output out of the main transcript (subagent or exit-code+tail only) and warm the nix eval/build cache -- see issues #303 and #304. The flat --max-turns backstop alone is insufficient (it just trades runaway cost for truncated work); pair it with a plan/self-review bookend (#300) and consider a per-path-class cap (higher for nix-modules). assert the runner invokes claude with a turn cap AND that nix validation feeds back only exit code + tail."

type: behavior-upgrade
dedupe_key: agent-run-issue:session-cost-scales-with-turn-count
triggers: [scripts/agent-run-issue.sh, claude -p, cache_read_input_tokens, num_turns, .agents/state/sessions]
targets: [scripts/agent-run-issue.sh]
risk: "too-low a --max-turns truncates legitimate multi-step nix work mid-session, producing blocked outcomes that need re-runs"
