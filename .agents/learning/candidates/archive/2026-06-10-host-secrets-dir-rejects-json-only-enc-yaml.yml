schema: learning-candidate/v1
id: 2026-06-10-host-secrets-dir-rejects-json-only-enc-yaml
date: 2026-06-10
expires: 2026-12-10
status: superseded

route: promote-doc
best_form: doc

evidence: [pr-#172-commit-b72295a, "pre-commit no-plaintext-secrets: Invalid staged file under hosts/*/secrets/*: hosts/gcp-agent/secrets/claude-credentials.json — Allowed file types are .enc, .age, and SOPS-managed .yaml/.yml", hosts/gcp-agent/default.nix-sops.secrets.claude_credentials-format-binary]
observation: hosts/*/secrets/ permits only .enc/.age/SOPS-.yaml/.yml (no .json), unlike home/users/user/secrets/ which allows .json; a JSON host secret (e.g. claude-credentials.json) is rejected by the no-plaintext-secrets hook at commit time, after build/eval already passed.
proposed_upgrade: Document in docs/security.md that host JSON secrets must be stored as binary .enc (sops -e --input-type binary; sops-nix secret format = "binary") because hosts/*/secrets/ disallows .json; note the asymmetry with the &user secrets dir.
type: workflow-gotcha
dedupe_key: sops:host-secrets-dir-no-json-only-enc-yaml
triggers: [adding sops secret under hosts/*/secrets/, .json secret file, no-plaintext-secrets hook]
targets: [docs/security.md]
