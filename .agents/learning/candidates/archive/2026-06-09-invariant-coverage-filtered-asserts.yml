observation: security invariants that filter-then-assert (sudo allowlist check ignores group/other-user NOPASSWD rules) or skip a registry host (gcp-builder has zero invariant coverage despite root-equivalent posture) let documented guarantees regress silently through merge-gate
proposed_upgrade: assert over the complete option value (residue-after-filter must be empty) in mainAgentMaintenanceSudoAllowlist, and derive invariant-check coverage from the host registry so every active host gets an access-invariant set
