schema: learning-candidate/v1
id: 2026-06-11-sops-host-secret-paths-collide-with-hm-config-dirs
date: 2026-06-11
expires: 2026-12-11
status: superseded

route: promote-doc
best_form: doc

evidence: [pr-#176, hosts/gcp-agent/default.nix-sops.secrets.claude_credentials-path-.claude/.credentials.json, hosts/gcp-agent/default.nix-sops.secrets.gh_hosts-path-.config/gh/hosts.yml, "fresh gcp-agent provision: systemctl is-system-running=degraded, home-manager-user.service failed mkdir ~/.config/bat: Permission denied", "gh auth status: failed to write config after migration: open /home/user/.config/gh/config.yml: permission denied"]
observation: A NixOS-level (root) sops.secrets.<x>.path under a Home-Manager-managed user dir (e.g. ~/.claude/.credentials.json, ~/.config/gh/hosts.yml) causes sops-install-secrets (root, sysinit.target, races systemd-tmpfiles-setup) to mkdir -p the parent dirs (~/.claude, ~/.config, ~/.config/gh) as root:root the first time they don't exist, blocking home-manager-user.service linkGeneration and gh's own config writes into the same dir. Fixed on gcp-agent via systemd.tmpfiles.rules `d <dir> 0755 user users -` for each affected parent dir plus `services.sops-install-secrets.after = ["systemd-tmpfiles-setup.service"]` so the tmpfiles rules win the race (d only sets ownership on creation, so idempotent).
proposed_upgrade: Document this pattern in docs/security.md secrets section (near the host-secrets-dir-rejects-json note) — when a host-level sops secret's path lives under a user's HM-managed home dir, pre-create the parent dir(s) as the target user via systemd.tmpfiles.rules `d` rules and order sops-install-secrets after systemd-tmpfiles-setup.service. Reference hosts/gcp-agent/default.nix as the worked example.
type: repo-fix
dedupe_key: sops:host-secret-path-under-hm-config-dir
triggers: [sops.secrets with path under /home/<user>/.config or /home/<user>/.claude, new on-demand host with host-scoped sops secrets, home-manager-user.service degraded, gh auth status permission denied]
targets: [docs/security.md]
