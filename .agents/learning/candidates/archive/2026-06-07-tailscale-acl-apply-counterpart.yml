evidence: [scripts/check-tailscale-acl-drift.sh uses `jq -S '{tagOwners, acls}'` on both sides; rendered .#packages.x86_64-linux.tailscale-acl contained only acls+tagOwners]
observation: repo has an ACL drift detector but no apply counterpart; rendered artifact carries only acls+tagOwners, so a raw POST to the Tailscale ACL endpoint replaces the whole policy and silently wipes other live sections (ssh, autoApprovers, nodeAttrs, groups)
proposed_upgrade: add scripts/apply-tailscale-acl.sh that fetches live policy, merges in only .acls and .tagOwners from the rendered artifact, then POSTs back
