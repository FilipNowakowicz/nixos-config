schema: learning-candidate/v1
id: 2026-06-13-nix-develop-c-swallows-command-stdout
date: 2026-06-13
expires: 2026-12-13
status: open

route: implement-fix
best_form: none

evidence: ["session 2026-06-13: `nix develop -c bash scripts/validate.sh docs >/tmp/validate-docs.log 2>&1` exited 0 with only 'warning: Git tree dirty' in the log, while direct `bash scripts/validate.sh docs` printed 16 self-test pass lines", "same for `nix develop -c pre-commit run --all-files` (rc=0, no hook output)", "session 2026-06-13 (issue #263 PR #264): direct `bash scripts/validate.sh docs` failed with 'python3: command not found' (python3 not on bare PATH); `nix shell nixpkgs#python3 -c bash scripts/validate.sh docs` succeeded and printed all 16 self-test pass lines, working around both the missing-python3 and stdout-swallowing problems"]
observation: in this repo `nix develop -c <cmd>` returns the command's exit code but the command's stdout never reaches the caller — only nix's own stderr arrives — likely the flake dev shellHook (git-hooks/pre-commit install chatter) interfering; an agent can misread a silent rc=0 as "checks did not run" and waste cycles re-running or debugging. Separately, a bare non-dev-shell session has no `python3` on PATH, so `scripts/validate.sh docs` (which calls `scripts/check-doc-links.sh`, a python3 script) fails outright without it.
proposed_upgrade: reproduce and fix the dev shell so `nix develop -c` passes through command stdout, or (if upstream behavior) note in CLAUDE.md/docs/nix-verification-loop that `scripts/validate.sh docs` needs python3 and should be run as `nix shell nixpkgs#python3 -c bash scripts/validate.sh docs` in a bare session — this single form avoids both the missing-python3 and the `nix develop -c` stdout-swallowing problems.

type: workflow-gotcha
dedupe_key: dev-shell:nix-develop-c-stdout-swallowed
targets: [flake.nix, scripts/validate.sh]
