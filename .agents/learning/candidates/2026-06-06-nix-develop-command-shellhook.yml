evidence: [command `nix develop --command sh -c 'echo COMMAND_WORKS'` exited 0 without printing the command output; `.github/workflows/deploy-homeserver.yml` uses `nix shell nixpkgs#deploy-rs -c deploy` instead]
observation: The default dev shell unconditionally execs zsh in shellHook, so `nix develop --command ...` is not a reliable automation wrapper in this repo.
proposed_upgrade: Document automation-safe alternatives such as direct flake apps/packages or `nix shell nixpkgs#tool -c ...` for non-interactive commands.
