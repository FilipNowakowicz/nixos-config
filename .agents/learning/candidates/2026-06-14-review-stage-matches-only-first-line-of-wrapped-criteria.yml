observation: agent-review-stage's acceptance-criteria matcher keys on the first physical line of each issue bullet only; an 'approved' evidence file whose acceptance_criteria[].criterion holds the full (unwrapped) bullet text fails the check confusingly, even though init scaffolds the same truncated strings.
proposed_upgrade: Either join wrapped continuation lines in extract_acceptance_criteria before matching (robust to issue formatting), or document that reviewers must seed evidence from `agent-review-stage init` rather than hand-authoring criterion strings. Add a self-test bullet that wraps across lines to lock the chosen behavior.
