evidence: [pr-#363, commit-29a5b09, commit-f0892b1]
observation: A gtk4-layer-shell full-output surface (all four edges anchored + set_exclusive_zone(-1)) is the correct base for a corner panel with click-outside dismiss — but it silently collapses to a content-sized surface placed top-left (e.g. 414x608 @ 0,0 instead of 1920x1080) when the window has set_resizable(False); that single call, not the anchoring, was the earlier "opens off-screen" failure. With resizable left True it fills the output; pin the panel top-right via child halign=END/valign=START + margins, and dismiss on a Gtk.GestureClick on the transparent root whose handler hides the window unless panel.compute_bounds(root) contains the press (set that sequence DENIED so inner button/slider-drag gestures still win). A focus-leave (EventControllerFocus) dismiss is wrong under Hyprland focus-follows-mouse — it fires on hover, closing the panel when the cursor merely passes off it.
proposed_upgrade: Note in the control-center README/app.py that the layer-shell panel uses a full-output 4-edge anchor + exclusive_zone(-1) with resizable=True (NOT set_resizable(False), which pins the surface to content size), child-alignment placement, and click-outside-bounds dismiss rather than focus-leave.
