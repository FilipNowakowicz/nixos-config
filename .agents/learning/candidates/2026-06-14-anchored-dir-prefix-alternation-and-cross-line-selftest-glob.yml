status: open
route: implement-fix
best_form: test
evidence: ["pr-#290", ".agents/governance.yaml protected rule was ^(...|\\.agents/scripts/|\\.claude/hooks/|...)$ — files UNDER those dirs classified low/unprotected by agent-policy-eval; verified `.agents/scripts/agent-merge-gate` returned requires_human_review=false before fix", "agent-policy-eval self-test asserted protected paths with `[[ $out == *$'\\n'\"$p\"$'\\t'*$'\\t'true$'\\t'* ]]` which matched a LATER true row across newlines, masking the bug (green CI)"]
observation: "In a POSIX ERE alternation anchored with ^(a|dir/|b)$, a directory-prefix alternative only matches the literal prefix, never files under it; and a self-test that greps a multi-line table with a `*...*` glob can pass by spanning newlines into an unrelated row."
proposed_upgrade: "When matching path prefixes in anchored alternations use a trailing .+ (dir/.+); assert tabular self-test output per-row (awk -F'\\t' '$1==p && $3==\"true\"') not with whole-output globs. Consider a check that flags `/)$` or `/|` inside ^(...)$ governance patterns."
