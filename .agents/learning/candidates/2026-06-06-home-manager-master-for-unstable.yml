evidence: ["flake.nix:5 nixpkgs.url = github:NixOS/nixpkgs/nixos-unstable", "flake.nix:13 home-manager.url = github:nix-community/home-manager/master", "nix eval --json .#nixosConfigurations.main.config.home-manager.users.user.home.version -> full=26.11 isReleaseBranch=false", "bash scripts/validate.sh flake-eval -> all checks passed"]
observation: When this flake tracks nixos-unstable, Home Manager release branches can lag and trigger release mismatch warnings; using home-manager/master keeps evaluated Home Manager aligned with the rolling NixOS release.
proposed_upgrade: Document the pairing rule near flake inputs or operations docs: nixos-unstable pairs with Home Manager master; stable nixpkgs release branches pair with matching Home Manager release branches.

