schema: learning-candidate/v1
id: 2026-06-28-exec-once-not-restarted-on-rebuild
date: 2026-06-28
expires: 2026-12-28
status: open

route: promote-doc
best_form: doc

evidence: [pr-#363, commit-36bdcfc]
observation: Hyprland `exec-once` only fires at session login, so a `home-manager switch` (rebuild) never (re)starts a newly-added or changed exec-once helper — the waybar-autohide watcher stayed dead after rebuild and hover/SUPER+W did nothing until relogin. Also waybar `start_hidden: true` parks the bar on the bottom layer (behind windows) at startup and needs two SIGUSR1 toggles to lift to the top layer.
proposed_upgrade: Document in hosts/main or docs/operations that long-running per-session helpers belong in `systemd.user.services` bound to nixos-fake-graphical-session.target (Restart=always), not Hyprland `exec-once`, so a rebuild restarts them and they survive crashes; reserve exec-once for one-shot startup commands.
type: workflow-gotcha
dedupe_key: hypr:exec-once-not-restarted-on-rebuild
triggers: [home/files/hypr/hyprland.conf, home-manager switch, waybar-autohide]
targets: [docs/operations.md, hosts/main/CLAUDE.md]
