observation: home/files/scripts/* and packages/*/src/** edits are NOT live-testable until rebuild; the binaries in PATH ($HOME/.nix-profile or /etc/profiles/per-user/user/bin) point to the last built store path, so functional testing against the deployed binary silently runs old code
proposed_upgrade: add a note to hosts/main/CLAUDE.md (or the relevant workflow section) that source edits under home/files/scripts/ and packages/ require `rebuild` before any live testing; suggest using `python3 /path/to/source.py` directly for quick iteration instead of the wrapper binary
