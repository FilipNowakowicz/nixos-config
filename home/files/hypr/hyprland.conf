# ── Theme ────────────────────────────────────────────────────────────────────
# Generated by home-manager from home/theme/colors.nix
source = ~/.config/hypr/colors.conf


# ── Autostart ────────────────────────────────────────────────────────────────
# Start Home Manager user services (including hypridle) bound to the fake
# graphical target for Wayland sessions.
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_SESSION_TYPE DISPLAY XDG_CURRENT_DESKTOP HYPRLAND_INSTANCE_SIGNATURE MOZ_ENABLE_WAYLAND NIXOS_OZONE_WL LIBVA_DRIVER_NAME AQ_DRM_DEVICES __GLX_VENDOR_LIBRARY_NAME && systemctl --user start nixos-fake-graphical-session.target
exec-once = /run/current-system/sw/libexec/polkit-gnome-authentication-agent-1
exec-once = swaybg -m fill -i ~/.local/share/wallpapers/current.png
exec-once = waybar
exec-once = waybar-autohide
exec-once = swayosd-server
exec-once = control-center --daemon
exec = hypr-display-mode auto


# ── Monitors ─────────────────────────────────────────────────────────────────
# `hyprctl monitors` to list detected outputs; add per-monitor lines as needed.
# highrr = native resolution at the panel's highest refresh rate. The internal
# eDP-1 panel is 60Hz-only so this is a no-op there, but it future-proofs
# external/dock outputs (which is where a >60Hz panel would actually appear).
monitor = ,highrr,auto,1


# ── Input ─────────────────────────────────────────────────────────────────────
input {
    kb_layout  = us
    kb_variant = dvorak

    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        # Precision-touchpad feel: scroll content (not the viewport), tap to
        # click, and silence the pad while typing so the cursor doesn't jump.
        natural_scroll       = true
        tap-to-click         = true
        disable_while_typing = true
        clickfinger_behavior = true   # 2-finger = right click, 3-finger = middle
        scroll_factor        = 0.4    # tame the default scroll speed
    }
}

# Three-finger swipe between workspaces (the macOS gesture). The old
# `gestures {}` category was removed in Hyprland 0.49; this is the new unified
# `gesture` keyword: <finger_count>, <direction>, <action>.
gesture = 3, horizontal, workspace


# ── General ───────────────────────────────────────────────────────────────────
general {
    gaps_in  = 8
    gaps_out = 12
    border_size = 2

    col.active_border   = $col_active
    col.inactive_border = $col_inactive
}

# Single tiled window: fill the screen edge-to-edge
workspace = w[tv1], gapsout:12, bordersize:0, rounding:12


# ── Decoration ───────────────────────────────────────────────────────────────
decoration {
    rounding = 12

    blur {
        # Blur cost scales ~ passes × size², which is the dominant per-frame GPU
        # load on the Intel iGPU. size 4 / passes 2 keeps ~95% of the frosted
        # look for roughly half the cost; xray skips re-blurring behind opaque
        # windows, and ignore_opacity off avoids blurring near-opaque surfaces.
        enabled           = true
        size              = 4
        passes            = 2
        new_optimizations = true
        ignore_opacity    = false
        xray              = true

        # Frosted-glass look (the macOS "vibrancy" effect) — tints the blur
        # toward the wallpaper instead of a flat grey smear.
        vibrancy          = 0.17
        vibrancy_darkness = 0.2
        noise             = 0.012
    }

    # Larger range + higher render_power = a soft, wide falloff that reads as
    # depth rather than a hard drop-shadow rectangle.
    shadow {
        enabled      = true
        range        = 20
        render_power = 3
        color        = $col_shadow
    }
}


# ── Misc ───────────────────────────────────────────────────────────────────────
misc {
    # vrr = 2 enables adaptive sync for fullscreen only: the 60Hz eDP panel
    # won't advertise it, but external/dock displays benefit for video/games
    # without risking desktop flicker (vrr = 1). VFR is always-on internally in
    # current Hyprland — the old misc:vfr option was removed in a later release.
    vrr = 2
}


# ── Layer rules ──────────────────────────────────────────────────────────────
# Auto-hide bar: slide the waybar pill in/out from the top edge instead of
# popping. Anchored at the top, so `slide` enters from above.
layerrule = animation slide, waybar

# Control center: the surface spans the whole output (its transparent area is a
# light-dismiss backdrop), so fade it in and use ignorealpha so the blur frosts
# only the opaque panel, not the entire screen behind the backdrop.
layerrule = animation fade, control-center
layerrule = blur, control-center
layerrule = ignorealpha 0.3, control-center


# ── Animations ───────────────────────────────────────────────────────────────
animations {
    enabled = true

    # Curves. Durations below are in deciseconds (x100ms).
    bezier = smooth,   0.22, 1.00, 0.36, 1.00   # easeOutQuint — premium deceleration
    bezier = snappy,   0.16, 1.00, 0.30, 1.00   # easeOutExpo  — quick but still eased
    bezier = spring,   0.18, 0.90, 0.16, 1.05   # gentle overshoot for window open
    bezier = momentum, 0.40, 0.00, 0.10, 1.00   # weighted slide for special workspace

    # Windows: a soft spring on open (settles with a tiny overshoot), eased on
    # close and move. popin 90% keeps the scale subtle so it glides, not pops.
    # Durations kept around ~250ms so motion reads as snappy (macOS/Windows
    # pacing) rather than sluggish, while staying smooth.
    animation = windows,     1, 2.5, spring, popin 90%
    animation = windowsIn,   1, 2.5, spring, popin 90%
    animation = windowsOut,  1, 2.2, smooth, popin 95%
    animation = windowsMove, 1, 2.5, smooth

    # Borders settle with the window rather than snapping.
    animation = border, 1, 6, smooth

    # Fades trail the motion slightly so windows "settle" into place.
    animation = fade,    1, 3.0, smooth
    animation = fadeIn,  1, 3.0, smooth
    animation = fadeOut, 1, 2.5, smooth

    # Workspaces: slide + fade with momentum (slideh alone feels mechanical).
    animation = workspaces,       1, 3.0, smooth,   slidefade 12%
    animation = specialWorkspace, 1, 3.0, momentum, slidevert

    # Layer surfaces (waybar, launcher, notifications) fade in.
    animation = layers, 1, 3.0, smooth, fade
}


# ── Keybindings ───────────────────────────────────────────────────────────────
$mod = SUPER

bind = $mod, Return,     exec, kitty
bind = $mod, apostrophe, killactive
bind = $mod, b,          exec, firefox
bind = $mod, BackSpace,  exec, hyprlock
bind = $mod, c,          exec, control-center
bind = $mod, W,          exec, waybar-toggle
bind = $mod, Space,      exec, launcher

# Focus (vim-style, Dvorak key names)
bind = $mod, h, movefocus, l
bind = $mod, j, movefocus, d
bind = $mod, k, movefocus, u
bind = $mod, l, movefocus, r

# Move window (vim-style, Dvorak key names)
bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, j, movewindow, d
bind = $mod SHIFT, k, movewindow, u
bind = $mod SHIFT, l, movewindow, r

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Screenshots
bind = $mod CTRL,  P, exec, grim -g "$(slurp)" - | wl-copy
bind = $mod SHIFT, P, exec, grim - | wl-copy

# Media keys — routed through swayosd-server for OSD popup
bind = ,XF86MonBrightnessUp,   exec, swayosd-client --brightness raise
bind = ,XF86MonBrightnessDown, exec, swayosd-client --brightness lower
bind = ,XF86AudioRaiseVolume,  exec, swayosd-client --output-volume raise
bind = ,XF86AudioLowerVolume,  exec, swayosd-client --output-volume lower
bind  = ,XF86AudioMute,         exec, swayosd-client --output-volume mute-toggle

# Clipboard & Window
bind = $mod, V, exec, kitty --class clipboard-picker -e clipboard-pick
bind = $mod, T, togglefloating
