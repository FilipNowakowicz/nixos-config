<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Control Center Preview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0a0a0a;
        --brown: #2a2a2a;
        --orange: #888888;
        --amber: #cccccc;
        --text: #e8e8e8;
        --bg-rgb: 10, 10, 10;
        --brown-rgb: 42, 42, 42;
        --orange-rgb: 136, 136, 136;
        --amber-rgb: 204, 204, 204;
        --text-rgb: 232, 232, 232;
      }

      body {
        font-family: "Inter", sans-serif;
        font-size: 12px;
        min-height: 100vh;
        color: var(--text);
        overflow: hidden;
        background:
          radial-gradient(
            ellipse at 24% 28%,
            rgba(var(--amber-rgb), 0.08) 0%,
            transparent 45%
          ),
          radial-gradient(
            ellipse at 78% 32%,
            rgba(var(--orange-rgb), 0.11) 0%,
            transparent 40%
          ),
          radial-gradient(
            ellipse at 52% 100%,
            rgba(var(--text-rgb), 0.04) 0%,
            transparent 55%
          ),
          #111013;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 0;
      }

      .shell {
        position: relative;
        min-height: 100vh;
        z-index: 1;
      }

      /* Inline SVG icons share a stroke style; size set per-context. */
      svg.icon {
        width: 16px;
        height: 16px;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.75;
        stroke-linecap: round;
        stroke-linejoin: round;
        flex: 0 0 auto;
        display: inline-block;
        vertical-align: middle;
      }
      svg.icon.fill {
        fill: currentColor;
        stroke: none;
      }
      svg.icon.sm {
        width: 13px;
        height: 13px;
      }
      svg.icon.lg {
        width: 20px;
        height: 20px;
      }
      svg.icon.xl {
        width: 24px;
        height: 24px;
      }

      /* ─────────────────────────────────────────────────────────
         WAYBAR
         ───────────────────────────────────────────────────────── */

      #waybar {
        position: fixed;
        top: 6px;
        left: 12px;
        right: 12px;
        height: 48px;
        display: flex;
        align-items: stretch;
        z-index: 100;
        pointer-events: none;
        animation: fade-down 320ms ease both;
      }

      .bar-section {
        display: flex;
        align-items: center;
        pointer-events: all;
      }
      .bar-left {
        flex: 0 0 auto;
      }
      .bar-center {
        flex: 1;
        justify-content: center;
        gap: 4px;
      }
      .bar-right {
        flex: 0 0 auto;
        margin-left: auto;
      }

      .pill {
        display: flex;
        align-items: center;
        height: calc(100% - 12px);
        margin: 6px 3px;
        border-radius: 12px;
        border: 1px solid rgba(var(--orange-rgb), 0.28);
        background: rgba(var(--bg-rgb), 0.82);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.02),
          0 10px 30px rgba(0, 0, 0, 0.18);
      }

      #workspaces {
        gap: 2px;
        padding: 0 10px;
      }
      .ws-dot {
        padding: 0 4px;
        color: rgba(var(--text-rgb), 0.23);
        font-size: 9px;
        line-height: 1;
      }
      .ws-dot.used {
        color: rgba(var(--text-rgb), 0.82);
      }
      .ws-dot.active {
        color: var(--amber);
      }

      #clock {
        padding: 0 18px;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.01em;
        white-space: nowrap;
      }
      #clock .dim {
        opacity: 0.48;
      }

      /* Connected right cluster — single elongated pill housing
         every status indicator. Variety comes from mixing icon-only
         toggles with icon+value readouts and tiny status accessories
         (signal bars, battery fill) so the strip doesn't read as
         seven identical glyphs in a row. */
      /* ── Tiny Anchor bar ─────────────────────────────────
         A single always-present dot at the leftmost slot acts as
         the discoverable trigger for the Control Center. Status
         icons appear to its right only when their state is non-
         default. Battery is hidden when on AC at 100%. */
      .anchor-bar {
        gap: 0;
        padding: 0 4px;
        background: linear-gradient(
          180deg,
          rgba(var(--bg-rgb), 0.86) 0%,
          rgba(var(--bg-rgb), 0.78) 100%
        );
        display: flex;
      }
      .anchor-bar.open-state {
        border-color: rgba(var(--amber-rgb), 0.4);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.03),
          0 0 0 1px rgba(var(--amber-rgb), 0.12),
          0 12px 36px rgba(0, 0, 0, 0.28);
      }

      .anchor-btn {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 100%;
        padding: 0 8px;
        color: rgba(var(--text-rgb), 0.74);
        background: transparent;
        border: none;
        cursor: pointer;
        font-size: 14px;
        transition:
          color 140ms ease,
          background 140ms ease;
      }
      .anchor-btn:hover {
        color: var(--text);
        background: rgba(255, 255, 255, 0.04);
        border-radius: 8px;
      }
      .anchor-btn.amber {
        color: var(--amber);
      }
      .anchor-btn.warn {
        color: rgb(232, 137, 32);
      }
      .anchor-btn .cluster-text {
        font-size: 11px;
        font-weight: 500;
        font-variant-numeric: tabular-nums;
      }

      /* Conditional visibility driven by data-state on the bar. */
      .anchor-item {
        display: none;
      }
      .anchor-bar[data-state~="vpn"] .anchor-vpn,
      .anchor-bar[data-state~="dnd"] .anchor-dnd,
      .anchor-bar[data-state~="mic"] .anchor-mic,
      .anchor-bar[data-state~="bat"] .anchor-bat {
        display: inline-flex;
      }

      /* The anchor dot itself — always present, recolors with
         state severity so it acts as a tiny status indicator. */
      .anchor-dot {
        width: 22px;
        height: 28px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        border: none;
        cursor: pointer;
        margin: 0 2px;
      }
      .anchor-dot::after {
        content: "";
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: rgba(var(--text-rgb), 0.28);
        transition:
          background 240ms ease,
          box-shadow 240ms ease,
          transform 240ms ease;
      }
      .anchor-dot:hover::after {
        background: rgba(var(--text-rgb), 0.6);
        transform: scale(1.15);
      }
      .anchor-bar.glow .anchor-dot::after {
        background: var(--amber);
        box-shadow: 0 0 6px rgba(var(--amber-rgb), 0.65);
      }
      .anchor-bar.warn-glow .anchor-dot::after {
        background: rgb(232, 137, 32);
        box-shadow: 0 0 8px rgba(232, 137, 32, 0.75);
      }

      .cluster-group {
        display: inline-flex;
        align-items: stretch;
      }
      .cluster-divider {
        width: 1px;
        align-self: center;
        height: 18px;
        margin: 0 4px;
        background: linear-gradient(
          180deg,
          transparent,
          rgba(var(--orange-rgb), 0.32) 35%,
          rgba(var(--orange-rgb), 0.32) 65%,
          transparent
        );
      }

      .cluster-btn {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 100%;
        padding: 0 9px;
        color: rgba(var(--text-rgb), 0.72);
        border: none;
        background: transparent;
        cursor: pointer;
        transition:
          color 140ms ease,
          background 140ms ease,
          opacity 140ms ease;
      }
      .cluster-btn:hover {
        color: var(--text);
        background: rgba(255, 255, 255, 0.04);
        border-radius: 8px;
      }
      .cluster-btn.dim {
        opacity: 0.42;
      }
      .cluster-btn.active {
        color: var(--amber);
      }
      .cluster-btn.danger {
        color: rgb(232, 137, 32);
      }
      .cluster-btn .cluster-text {
        font-size: 11px;
        font-weight: 500;
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.01em;
      }
      .cluster-btn.brand .cluster-text {
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      /* Status dot under toggleable icons. Hidden on items that
         already carry value text — those don't need a redundant
         indicator. */
      .cluster-btn .dot {
        position: absolute;
        bottom: 4px;
        left: 50%;
        width: 3px;
        height: 3px;
        margin-left: -1.5px;
        border-radius: 50%;
        background: rgba(var(--text-rgb), 0.16);
        transition:
          background 140ms ease,
          box-shadow 140ms ease;
      }
      .cluster-btn.active .dot {
        background: var(--amber);
        box-shadow: 0 0 6px rgba(var(--amber-rgb), 0.7);
      }

      /* Signal-strength bars rendered next to Wi-Fi icon. */
      .signal-bars {
        display: inline-flex;
        align-items: flex-end;
        gap: 1.5px;
        margin-left: 1px;
        height: 12px;
      }
      .signal-bars i {
        display: block;
        width: 2px;
        background: currentColor;
        border-radius: 1px;
        opacity: 0.35;
      }
      .signal-bars i:nth-child(1) {
        height: 3px;
      }
      .signal-bars i:nth-child(2) {
        height: 6px;
      }
      .signal-bars i:nth-child(3) {
        height: 9px;
      }
      .signal-bars i:nth-child(4) {
        height: 12px;
      }
      .signal-bars.s-4 i {
        opacity: 1;
      }
      .signal-bars.s-3 i:nth-child(-n + 3) {
        opacity: 1;
      }
      .signal-bars.s-2 i:nth-child(-n + 2) {
        opacity: 1;
      }
      .signal-bars.s-1 i:nth-child(-n + 1) {
        opacity: 1;
      }

      /* Battery shell + fill — drawn rather than a glyph so the
         level reads at a glance. */
      .battery {
        position: relative;
        display: inline-flex;
        align-items: center;
        width: 22px;
        height: 11px;
        border: 1.25px solid currentColor;
        border-radius: 3px;
        padding: 1px;
        margin-right: 4px;
      }
      .battery::after {
        content: "";
        position: absolute;
        right: -3.5px;
        top: 3px;
        width: 2px;
        height: 5px;
        background: currentColor;
        border-radius: 0 1px 1px 0;
      }
      .battery .bfill {
        height: 100%;
        background: currentColor;
        border-radius: 1px;
      }
      .battery.charging::before {
        content: "";
        position: absolute;
        inset: 0;
        margin: auto;
        width: 8px;
        height: 8px;
        background: var(--bg);
        clip-path: polygon(
          45% 0,
          0 60%,
          38% 60%,
          25% 100%,
          100% 35%,
          55% 35%,
          70% 0
        );
      }

      #launcher-pill {
        position: relative;
        width: 154px;
        max-width: 220px;
        justify-content: center;
        color: rgba(var(--text-rgb), 0.4);
        border-style: dashed;
        cursor: default;
      }
      #launcher-pill .launcher-label {
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      /* ─────────────────────────────────────────────────────────
         Controls dock
         ───────────────────────────────────────────────────────── */
      #controls {
        position: fixed;
        left: 24px;
        bottom: 24px;
        display: grid;
        gap: 14px;
        z-index: 220;
      }
      .control-card {
        width: 360px;
        padding: 14px;
        border-radius: 16px;
        border: 1px solid rgba(var(--orange-rgb), 0.22);
        background: rgba(var(--bg-rgb), 0.8);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
      }
      .control-title {
        margin-bottom: 10px;
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(var(--text-rgb), 0.42);
      }
      .theme-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .theme-btn {
        padding: 8px 11px;
        color: rgba(var(--text-rgb), 0.6);
        background: rgba(255, 255, 255, 0.035);
        font-size: 11px;
        border: 1px solid rgba(var(--orange-rgb), 0.2);
        border-radius: 11px;
        cursor: pointer;
        transition:
          color 120ms ease,
          background 120ms ease,
          border-color 120ms ease;
      }
      .theme-btn.active-theme {
        color: var(--amber);
        border-color: rgba(var(--amber-rgb), 0.5);
        background: rgba(var(--amber-rgb), 0.08);
      }
      .control-note {
        margin-top: 10px;
        line-height: 1.5;
        color: rgba(var(--text-rgb), 0.5);
        font-size: 11px;
      }
      button {
        appearance: none;
        -webkit-appearance: none;
        border: none;
        outline: none;
        font-family: inherit;
      }

      @keyframes fade-down {
        from {
          opacity: 0;
          transform: translateY(-4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes panel-in {
        from {
          opacity: 0;
          transform: translateY(-8px) scale(0.985);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
    </style>
  </head>

    <div class="shell">
      <!-- ───────────────── WAYBAR ───────────────── -->
      <div id="waybar">
        <div class="bar-section bar-left">
          <div class="pill" id="workspaces">
            <span class="ws-dot used">●</span>
            <span class="ws-dot active">●</span>
            <span class="ws-dot">○</span>
            <span class="ws-dot">○</span>
            <span class="ws-dot">○</span>
            <span class="ws-dot">○</span>
            <span class="ws-dot">○</span>
            <span class="ws-dot">○</span>
            <span class="ws-dot">○</span>
            <span class="ws-dot">○</span>
          </div>
        </div>

        <div class="bar-section bar-center">
          <div class="pill" id="launcher-pill">
            <span class="launcher-label">Launcher Surface</span>
          </div>
          <div class="pill" id="clock">
            <span id="clock-time">14:32</span>&nbsp;<span class="dim"
              >· <span id="clock-date">Wed 06</span></span
            >
          </div>
        </div>

        <div class="bar-section bar-right">
          <!-- Tiny Anchor: a single always-present dot is the
               discoverable Control-Center trigger. Status items
               (VPN / DND / mic-muted / battery) appear to its right
               only when their condition is non-default. The dot
               itself recolors with severity. -->
          <div
            class="pill anchor-bar open-state"
            id="anchor-bar"
            data-state="quiet"
          >
            <button
              class="anchor-dot"
              data-open-panel
              title="Open Control Center"
            ></button>

            <button
              class="anchor-btn anchor-item anchor-vpn amber"
              data-open-panel
              title="VPN active"
            >
              <svg class="icon"><use href="#i-shield" /></svg>
            </button>
            <button
              class="anchor-btn anchor-item anchor-dnd amber"
              data-open-panel
              title="Do Not Disturb"
            >
              <svg class="icon"><use href="#i-bell-off" /></svg>
            </button>
            <button
              class="anchor-btn anchor-item anchor-mic warn"
              data-open-panel
              title="Mic muted"
            >
              <svg class="icon"><use href="#i-mic-off" /></svg>
            </button>
            <button
              class="anchor-btn anchor-item anchor-bat"
              data-open-panel
              title="Battery"
            >
              <span class="battery"
                ><span class="bfill" style="width: 60%"></span
              ></span>
              <span class="cluster-text">60%</span>
            </button>
          </div>
        </div>
      </div>

      <!-- ───────────────── CONTROLS DOCK ───────────────── -->
      <div id="controls">
        <div class="control-card">
          <div class="control-title">Theme</div>
          <div class="theme-row">
            <button class="theme-btn active-theme" data-theme="mono-mesh">
              mono-mesh
            </button>
            <button class="theme-btn" data-theme="desert-dusk">
              desert-dusk
            </button>
            <button class="theme-btn" data-theme="acid-statue">
              acid-statue
            </button>
            <button class="theme-btn" data-theme="nighthawks">
              nighthawks
            </button>
          </div>
        </div>

        <div class="control-card">
          <div class="control-title">Bar Demo State</div>
          <div class="theme-row">
            <button class="theme-btn active-theme" data-demo-state="quiet">
              Quiet
            </button>
            <button class="theme-btn" data-demo-state="bat">On battery</button>
          </div>
          <div class="control-note">
            Tiny Anchor: the dot is always there for click access; everything
            else is conditional.<br />
            <strong>Quiet</strong> — AC + 100%, all defaults. Just the dot.<br />
            <strong>On battery</strong> — battery + 60% appear.
          </div>
        </div>
      </div>
    </div>

    <script>
      const THEMES = {
        "mono-mesh": {
          bg: [10, 10, 10],
          brown: [42, 42, 42],
          orange: [136, 136, 136],
          amber: [204, 204, 204],
          text: [232, 232, 232],
        },
        "desert-dusk": {
          bg: [28, 26, 24],
          brown: [74, 55, 40],
          orange: [196, 110, 26],
          amber: [232, 137, 12],
          text: [240, 208, 160],
        },
        "acid-statue": {
          bg: [30, 35, 48],
          brown: [46, 58, 74],
          orange: [74, 122, 106],
          amber: [168, 232, 64],
          text: [200, 212, 192],
        },
        nighthawks: {
          bg: [22, 26, 32],
          brown: [42, 48, 64],
          orange: [74, 85, 104],
          amber: [138, 164, 184],
          text: [200, 208, 216],
        },
      };

      function applyTheme(name) {
        const t = THEMES[name];
        if (!t) return;
        const root = document.documentElement;
        const hex = (rgb) =>
          "#" + rgb.map((v) => v.toString(16).padStart(2, "0")).join("");
        root.style.setProperty("--bg", hex(t.bg));
        root.style.setProperty("--brown", hex(t.brown));
        root.style.setProperty("--orange", hex(t.orange));
        root.style.setProperty("--amber", hex(t.amber));
        root.style.setProperty("--text", hex(t.text));
        root.style.setProperty("--bg-rgb", t.bg.join(", "));
        root.style.setProperty("--brown-rgb", t.brown.join(", "));
        root.style.setProperty("--orange-rgb", t.orange.join(", "));
        root.style.setProperty("--amber-rgb", t.amber.join(", "));
        root.style.setProperty("--text-rgb", t.text.join(", "));
        document.querySelectorAll("[data-theme]").forEach((el) => {
          el.classList.toggle("active-theme", el.dataset.theme === name);
        });
      }

      document
        .querySelectorAll(".theme-btn[data-theme], .theme-card")
        .forEach((el) => {
          el.addEventListener("click", () => applyTheme(el.dataset.theme));
        });

      // Bar demo state: drives the Tiny Anchor's appearance so we
      // can preview how it adapts to system state without faking
      // live signals.
      function setBarState(name) {
        const bar = document.getElementById("anchor-bar");
        const bat = bar.querySelector(".anchor-bat");
        const batFill = bat.querySelector(".bfill");
        const batText = bat.querySelector(".cluster-text");
        bar.classList.remove("glow", "warn-glow");
        bat.classList.remove("warn");

        if (name === "quiet") {
          bar.dataset.state = "quiet";
        } else if (name === "bat") {
          bar.dataset.state = "bat";
          batFill.style.width = "60%";
          batText.textContent = "60%";
        } else if (name === "vpn") {
          bar.dataset.state = "vpn";
          bar.classList.add("glow");
        } else if (name === "busy") {
          bar.dataset.state = "vpn mic bat";
          bar.classList.add("warn-glow");
          batFill.style.width = "18%";
          batText.textContent = "18%";
          bat.classList.add("warn");
        }

        document.querySelectorAll("[data-demo-state]").forEach((btn) => {
          btn.classList.toggle("active-theme", btn.dataset.demoState === name);
        });
      }
      document.querySelectorAll("[data-demo-state]").forEach((btn) => {
        btn.addEventListener("click", () => setBarState(btn.dataset.demoState));
      });

      function tickClock() {
        const now = new Date();
        const time = now.toLocaleTimeString([], {
          hour: "2-digit",
          minute: "2-digit",
          hour12: false,
        });
        const date = now.toLocaleDateString([], {
          weekday: "short",
          day: "2-digit",
        });
        document.getElementById("clock-time").textContent = time;
        document.getElementById("clock-date").textContent = date;
      }

      applyTheme("mono-mesh");
      tickClock();
      setInterval(tickClock, 1000);
    </script>
  </body>
