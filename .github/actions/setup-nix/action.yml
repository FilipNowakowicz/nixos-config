name: Setup Nix
description: Install Nix with R2 binary cache and optional /nix/store caching.

outputs:
  store-cache-enabled:
    description: Whether /nix/store caching is enabled for this invocation.
    value: ${{ steps.store-cache-metadata.outputs.enabled }}
  store-cache-label:
    description: Label used for /nix/store cache reporting.
    value: ${{ steps.store-cache-metadata.outputs.label }}
  store-cache-primary-key:
    description: Primary cache key used for /nix/store restore/save.
    value: ${{ steps.store-cache-metadata.outputs.primary-key }}
  store-cache-hit:
    description: Whether the restore phase hit an existing /nix/store cache.
    value: ${{ steps.store-cache-metadata.outputs.hit }}
  store-cache-restored-bytes:
    description: Approximate restored /nix/store size in bytes after restore.
    value: ${{ steps.store-cache-metadata.outputs.restored-bytes }}

inputs:
  extra-nix-config:
    description: Additional nix.conf lines (e.g. system-features for KVM tests).
    required: false
    default: ""
  enable-store-cache:
    description: |
      Cache /nix/store between runs via GHA cache. Worth enabling on slow jobs
      (host/test builds) where the per-job restore cost is amortized; not
      worth it on sub-minute jobs.
    required: false
    default: "false"
  enable-eval-cache:
    description: |
      Cache ~/.cache/nix between runs via GHA cache. Useful for eval-heavy jobs
      where restoring the small flake eval cache is cheaper than re-evaluating
      from cold.
    required: false
    default: "false"
  cache-key-suffix:
    description: |
      Suffix appended to the cache key to scope it per job. Without this,
      jobs would clobber each other's caches.
    required: false
    default: "shared"
  store-cache-size-gb:
    description: |
      Cap for /nix/store GHA cache (GB). Tune per job class to stay within
      the 10 GB per-repo GHA cache limit. Only used when enable-store-cache
      is true.
    required: false
    default: "5"

runs:
  using: composite
  steps:
    - name: Install Nix
      uses: cachix/install-nix-action@e4f4bde15728394ded896ef07491a85f2eb24956 # v31
      with:
        nix_path: nixpkgs=channel:nixos-unstable
        extra_nix_config: |
          experimental-features = nix-command flakes
          max-jobs = auto
          substituters = https://cache.nixos.org https://pub-706604c9179043ac98604d6de4c65c2c.r2.dev
          trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-cache-1:eEcFiWPHQpJmlcnNeGoPg6xxOp3itNZiWwFaE+NebIk=
          http-connections = 10
          keep-env-derivations = true
          keep-outputs = true
          ${{ inputs.extra-nix-config }}

    - name: Restore Nix store cache
      id: store-cache
      if: inputs.enable-store-cache == 'true'
      uses: nix-community/cache-nix-action/restore@7df957e333c1e5da7721f60227dbba6d06080569 # v7
      with:
        primary-key: nix-${{ runner.os }}-${{ inputs.cache-key-suffix }}-${{ hashFiles('flake.lock') }}
        restore-prefixes-first-match: nix-${{ runner.os }}-${{ inputs.cache-key-suffix }}-

    - name: Capture store cache restore metadata
      id: store-cache-metadata
      shell: bash
      run: |
        if [[ "${{ inputs.enable-store-cache }}" != "true" ]]; then
          {
            echo "enabled=false"
            echo "label="
            echo "primary-key="
            echo "hit="
            echo "restored-bytes=0"
          } >> "$GITHUB_OUTPUT"
          exit 0
        fi

        restored_bytes=0
        if command -v nix >/dev/null 2>&1; then
          restored_bytes="$(
            nix path-info --json --json-format 2 --all 2>/dev/null |
              python3 -c 'import json, sys; data = json.load(sys.stdin); info = data.get("info", {}); print(sum(int(item.get("narSize", 0)) for item in info.values() if isinstance(item, dict)))'
          )"
        fi

        {
          echo "enabled=true"
          echo "label=${{ inputs.cache-key-suffix }}"
          echo "primary-key=${{ steps.store-cache.outputs.primary-key }}"
          echo "hit=${{ steps.store-cache.outputs.hit }}"
          echo "restored-bytes=${restored_bytes:-0}"
        } >> "$GITHUB_OUTPUT"

    - name: Cache Nix eval cache
      if: inputs.enable-eval-cache == 'true'
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/.cache/nix
        key: nix-eval-${{ runner.os }}-${{ inputs.cache-key-suffix }}-${{ hashFiles('flake.lock', '**/*.nix') }}
        restore-keys: |
          nix-eval-${{ runner.os }}-${{ inputs.cache-key-suffix }}-
