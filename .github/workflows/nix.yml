name: Nix flake check

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: nix-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  push-policy:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
      reason: ${{ steps.decide.outputs.reason }}
    steps:
      - id: decide
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            if (context.eventName !== "push") {
              core.setOutput("should_run", "true");
              core.setOutput("reason", `non-push event: ${context.eventName}`);
              return;
            }

            const { owner, repo } = context.repo;
            const commitSha = context.sha;
            const pulls = await github.request(
              "GET /repos/{owner}/{repo}/commits/{commit_sha}/pulls",
              {
                owner,
                repo,
                commit_sha: commitSha,
                mediaType: { previews: ["groot"] },
              },
            );

            if (pulls.data.length > 0) {
              const numbers = pulls.data.map((pr) => `#${pr.number}`).join(", ");
              core.info(`Skipping push-triggered CI for ${commitSha}; associated PRs: ${numbers}`);
              core.setOutput("should_run", "false");
              core.setOutput("reason", `push commit is associated with PR(s): ${numbers}`);
              return;
            }

            core.info(`Running push-triggered CI for direct push ${commitSha}`);
            core.setOutput("should_run", "true");
            core.setOutput("reason", "direct push to main");

  changes:
    needs: push-policy
    if: needs.push-policy.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.plan.outputs.docs_only }}
      run_eval: ${{ steps.plan.outputs.run_eval }}
      run_lint: ${{ steps.plan.outputs.run_lint }}
      run_light: ${{ steps.plan.outputs.run_light }}
      run_packages: ${{ steps.plan.outputs.run_packages }}
      hosts: ${{ steps.plan.outputs.hosts }}
      hosts_matrix: ${{ steps.plan.outputs.hosts_matrix }}
      tests: ${{ steps.plan.outputs.tests }}
      tests_matrix: ${{ steps.plan.outputs.tests_matrix }}
      closure: ${{ steps.plan.outputs.closure }}
      closure_main: ${{ steps.plan.outputs.closure_main }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - id: plan
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: bash scripts/ci-plan.sh

      - name: Validate planner coverage
        run: bash scripts/test-ci-plan.sh

      - name: Validate cache config consistency
        run: bash scripts/check-cache-config.sh

  eval:
    needs: [push-policy, changes]
    if: needs.changes.outputs.run_eval == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: ./.github/actions/setup-nix
        with:
          enable-eval-cache: "true"

      - name: Flake evaluation
        run: bash scripts/validate.sh flake-eval

  checks-light:
    needs: [push-policy, changes]
    if: needs.changes.outputs.run_light == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - id: setup-nix
        uses: ./.github/actions/setup-nix
        with:
          enable-eval-cache: "true"
          enable-store-cache: "true"
          cache-key-suffix: checks-light
          store-cache-size-gb: "2"

      - name: Build lightweight blocking checks
        env:
          PATHS_FILE: ${{ runner.temp }}/checks-light-paths.txt
        run: |
          rm -f "$PATHS_FILE"
          PRINT_PATHS=1 bash scripts/validate.sh light | tee "$PATHS_FILE" >/dev/null

      - name: Push to cache
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        env:
          PATHS_FILE: ${{ runner.temp }}/checks-light-paths.txt
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CACHE_SIGNING_KEY: ${{ secrets.CACHE_SIGNING_KEY }}
        run: bash scripts/push-to-r2.sh

      - name: Save Nix store cache
        if: success() && steps.setup-nix.outputs.store-cache-enabled == 'true'
        uses: nix-community/cache-nix-action/save@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: ${{ steps.setup-nix.outputs.store-cache-primary-key }}
          gc-max-store-size-linux: "2G"
          purge: true
          purge-prefixes: nix-${{ runner.os }}-checks-light-
          purge-created: 0
          purge-last-accessed: 604800
          purge-primary-key: never

      - name: Summarize Nix store cache
        if: success() && steps.setup-nix.outputs.store-cache-enabled == 'true'
        env:
          CACHE_LABEL: ${{ steps.setup-nix.outputs.store-cache-label }}
          CACHE_HIT: ${{ steps.setup-nix.outputs.store-cache-hit }}
          RESTORED_BYTES: ${{ steps.setup-nix.outputs.store-cache-restored-bytes }}
        run: bash scripts/write-cache-summary.sh "$CACHE_LABEL" "$RESTORED_BYTES" "$CACHE_HIT"

  lint:
    needs: [push-policy, changes]
    if: needs.changes.outputs.run_lint == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: ./.github/actions/setup-nix

      - name: Lint (statix)
        run: nix run .#statix -- check .

      - name: Dead code (deadnix)
        run: nix run .#deadnix -- --fail .

      - name: Format check (treefmt)
        run: nix fmt -- --fail-on-change

      - name: Lint shell (shellcheck)
        run: |
          mapfile -t shell_scripts < <(find . -type f -name '*.sh' -not -path './.*')
          if [ "${#shell_scripts[@]}" -eq 0 ]; then
            exit 0
          fi
          nix run .#shellcheck -- "${shell_scripts[@]}"

      - name: Scan for plaintext secrets
        run: bash scripts/scan-plaintext-secrets.sh

      - name: Check Markdown links
        run: bash scripts/validate.sh docs

  packages:
    needs: [push-policy, changes]
    if: needs.changes.outputs.run_packages == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: ./.github/actions/setup-nix

      - name: Build inventory package
        env:
          PATHS_FILE: ${{ runner.temp }}/inventory-paths.txt
        run: |
          rm -f "$PATHS_FILE"
          PRINT_PATHS=1 bash scripts/validate.sh package inventory-data | tee "$PATHS_FILE" >/dev/null

      - name: Push inventory package to cache
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        env:
          PATHS_FILE: ${{ runner.temp }}/inventory-paths.txt
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CACHE_SIGNING_KEY: ${{ secrets.CACHE_SIGNING_KEY }}
        run: bash scripts/push-to-r2.sh

  hosts:
    needs: [push-policy, changes]
    if: needs.changes.outputs.hosts == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.changes.outputs.hosts_matrix) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - id: setup-nix
        uses: ./.github/actions/setup-nix
        with:
          enable-eval-cache: "true"
          enable-store-cache: "true"
          cache-key-suffix: hosts-${{ matrix.name }}
          store-cache-size-gb: "5"

      - name: Build ${{ matrix.name }}
        env:
          HOST: ${{ matrix.name }}
          PATHS_FILE: ${{ runner.temp }}/${{ matrix.name }}-paths.txt
        run: |
          rm -f "$PATHS_FILE"
          PRINT_PATHS=1 bash scripts/validate.sh host "$HOST" | tee "$PATHS_FILE" >/dev/null

      - name: Push ${{ matrix.name }} to cache
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        env:
          HOST: ${{ matrix.name }}
          PATHS_FILE: ${{ runner.temp }}/${{ matrix.name }}-paths.txt
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CACHE_SIGNING_KEY: ${{ secrets.CACHE_SIGNING_KEY }}
        run: bash scripts/push-to-r2.sh

      # Prime R2 with the full prod `main` closure (incremental over main-ci)
      # so future PR closure-diff jobs can fetch the base SHA from cache
      # instead of rebuilding it from scratch.
      - name: Push full main closure to R2 (warms closure-diff base)
        if: |
          success()
          && matrix.name == 'main-ci'
          && github.event_name == 'push'
          && github.ref == 'refs/heads/main'
        continue-on-error: true
        env:
          PATHS_FILE: ${{ runner.temp }}/main-paths.txt
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CACHE_SIGNING_KEY: ${{ secrets.CACHE_SIGNING_KEY }}
        run: |
          rm -f "$PATHS_FILE"
          PRINT_PATHS=1 bash scripts/validate.sh host main | tee "$PATHS_FILE" >/dev/null
          bash scripts/push-to-r2.sh

      - name: Save Nix store cache
        if: success() && steps.setup-nix.outputs.store-cache-enabled == 'true'
        uses: nix-community/cache-nix-action/save@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: ${{ steps.setup-nix.outputs.store-cache-primary-key }}
          gc-max-store-size-linux: "5G"
          purge: true
          purge-prefixes: nix-${{ runner.os }}-hosts-${{ matrix.name }}-
          purge-created: 0
          purge-last-accessed: 604800
          purge-primary-key: never

      - name: Summarize Nix store cache
        if: success() && steps.setup-nix.outputs.store-cache-enabled == 'true'
        env:
          CACHE_LABEL: ${{ steps.setup-nix.outputs.store-cache-label }}
          CACHE_HIT: ${{ steps.setup-nix.outputs.store-cache-hit }}
          RESTORED_BYTES: ${{ steps.setup-nix.outputs.store-cache-restored-bytes }}
        run: bash scripts/write-cache-summary.sh "$CACHE_LABEL" "$RESTORED_BYTES" "$CACHE_HIT"

  tests:
    needs: [push-policy, changes]
    if: needs.changes.outputs.tests == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.changes.outputs.tests_matrix) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Reclaim runner disk space
        run: |
          sudo rm -rf /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true

      - id: setup-nix
        uses: ./.github/actions/setup-nix
        with:
          enable-eval-cache: "true"
          enable-store-cache: "true"
          cache-key-suffix: tests-${{ matrix.name }}
          store-cache-size-gb: "3"
          extra-nix-config: |
            system-features = nixos-test benchmark big-parallel kvm

      - name: Build ${{ matrix.name }}
        env:
          CMD: ${{ matrix.command }}
          TARGET: ${{ matrix.target }}
          PATHS_FILE: ${{ runner.temp }}/${{ matrix.name }}-paths.txt
        run: |
          rm -f "$PATHS_FILE"
          PRINT_PATHS=1 bash scripts/validate.sh "$CMD" "$TARGET" | tee "$PATHS_FILE" >/dev/null

      - name: Push ${{ matrix.name }} to cache
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        env:
          CMD: ${{ matrix.command }}
          TARGET: ${{ matrix.target }}
          PATHS_FILE: ${{ runner.temp }}/${{ matrix.name }}-paths.txt
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CACHE_SIGNING_KEY: ${{ secrets.CACHE_SIGNING_KEY }}
        run: bash scripts/push-to-r2.sh

      - name: Save Nix store cache
        if: success() && steps.setup-nix.outputs.store-cache-enabled == 'true'
        uses: nix-community/cache-nix-action/save@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: ${{ steps.setup-nix.outputs.store-cache-primary-key }}
          gc-max-store-size-linux: "3G"
          purge: true
          purge-prefixes: nix-${{ runner.os }}-tests-${{ matrix.name }}-
          purge-created: 0
          purge-last-accessed: 604800
          purge-primary-key: never

      - name: Summarize Nix store cache
        if: success() && steps.setup-nix.outputs.store-cache-enabled == 'true'
        env:
          CACHE_LABEL: ${{ steps.setup-nix.outputs.store-cache-label }}
          CACHE_HIT: ${{ steps.setup-nix.outputs.store-cache-hit }}
          RESTORED_BYTES: ${{ steps.setup-nix.outputs.store-cache-restored-bytes }}
        run: bash scripts/write-cache-summary.sh "$CACHE_LABEL" "$RESTORED_BYTES" "$CACHE_HIT"

  closure-diff:
    if: |
      github.event_name == 'pull_request'
      && needs.changes.outputs.closure == 'true'
      && (needs.hosts.result == 'success' || needs.hosts.result == 'skipped')
    needs: [push-policy, changes, hosts]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      summary: ${{ steps.diff.outputs.summary }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - id: setup-nix
        uses: ./.github/actions/setup-nix
        with:
          enable-eval-cache: "true"
          enable-store-cache: "true"
          cache-key-suffix: hosts-main-full

      - name: Compute closure diffs
        id: diff
        env:
          DIFF_MAIN: ${{ needs.changes.outputs.closure_main }}
          BASE_REF: origin/${{ github.base_ref }}
        run: |
          TARGET_REF="HEAD"

          {
            echo "<!-- closure-diff-report -->"
            echo "# Closure Size Report"
            echo

            if [[ "$DIFF_MAIN" == "true" ]]; then
              bash scripts/closure-diff.sh "$BASE_REF" "$TARGET_REF" "main" || echo "Failed to diff main"
            fi
          } > /tmp/closure-summary.md

          {
            echo "summary<<EOF"
            cat /tmp/closure-summary.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  closure-diff-comment:
    if: |
      always()
      && github.event_name == 'pull_request'
      && needs.changes.outputs.closure == 'true'
      && (needs.hosts.result == 'success' || needs.hosts.result == 'skipped')
    needs: [changes, hosts, closure-diff]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Upsert closure diff comment
        env:
          SUMMARY: ${{ needs.closure-diff.outputs.summary }}
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const body =
              process.env.SUMMARY ||
              "<!-- closure-diff-report -->\nClosure diff computation skipped or failed.";
            const marker = "<!-- closure-diff-report -->";

            try {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100,
              });

              const existing = comments.find(
                (comment) =>
                  comment.user?.type === "Bot" && comment.body?.includes(marker),
              );

              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
                return;
              }

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            } catch (error) {
              core.warning(`Unable to upsert closure diff comment: ${error.message}`);
            }

  merge-gate:
    needs:
      - push-policy
      - changes
      - eval
      - checks-light
      - lint
      - packages
      - hosts
      - tests
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required checks passed
        env:
          RESULT_PUSH_POLICY: ${{ needs.push-policy.result }}
          POLICY_SHOULD_RUN: ${{ needs.push-policy.outputs.should_run }}
          POLICY_REASON: ${{ needs.push-policy.outputs.reason }}
          RESULT_CHANGES: ${{ needs.changes.result }}
          RESULT_EVAL: ${{ needs.eval.result }}
          RESULT_CHECKS_LIGHT: ${{ needs.checks-light.result }}
          RESULT_LINT: ${{ needs.lint.result }}
          RESULT_PACKAGES: ${{ needs.packages.result }}
          RESULT_HOSTS: ${{ needs.hosts.result }}
          RESULT_TESTS: ${{ needs.tests.result }}
          PLAN_DOCS_ONLY: ${{ needs.changes.outputs.docs_only }}
          PLAN_EVAL: ${{ needs.changes.outputs.run_eval }}
          PLAN_LINT: ${{ needs.changes.outputs.run_lint }}
          PLAN_LIGHT: ${{ needs.changes.outputs.run_light }}
          PLAN_PACKAGES: ${{ needs.changes.outputs.run_packages }}
          PLAN_HOSTS: ${{ needs.changes.outputs.hosts }}
          PLAN_TESTS: ${{ needs.changes.outputs.tests }}
        run: |
          if [[ "$POLICY_SHOULD_RUN" != "true" ]]; then
            echo "Skipping merge gate: $POLICY_REASON"
            exit 0
          fi

          require_when_planned() {
            local name=$1
            local planned=$2
            local result=$3

            if [[ "$planned" == "true" ]]; then
              [[ "$result" == "success" ]] || { echo "FAIL: $name ($result)"; fail=1; }
            else
              [[ "$result" == "skipped" ]] || { echo "FAIL: $name should have been skipped ($result)"; fail=1; }
            fi
          }

          echo "push-policy:   $RESULT_PUSH_POLICY"
          echo "policy run:    $POLICY_SHOULD_RUN"
          echo "policy reason: $POLICY_REASON"
          echo "changes:       $RESULT_CHANGES"
          echo "eval:          $RESULT_EVAL"
          echo "checks-light:  $RESULT_CHECKS_LIGHT"
          echo "lint:          $RESULT_LINT"
          echo "packages:      $RESULT_PACKAGES"
          echo "hosts:         $RESULT_HOSTS"
          echo "tests:         $RESULT_TESTS"
          echo "docs-only:     $PLAN_DOCS_ONLY"
          echo "plan eval:     $PLAN_EVAL"
          echo "plan lint:     $PLAN_LINT"
          echo "plan light:    $PLAN_LIGHT"
          echo "plan packages: $PLAN_PACKAGES"
          echo "plan hosts:    $PLAN_HOSTS"
          echo "plan tests:    $PLAN_TESTS"

          fail=0
          [[ "$RESULT_PUSH_POLICY" == "success" ]] || { echo "FAIL: push-policy ($RESULT_PUSH_POLICY)"; fail=1; }
          [[ "$RESULT_CHANGES" == "success" ]] || { echo "FAIL: changes ($RESULT_CHANGES)"; fail=1; }
          require_when_planned "eval" "$PLAN_EVAL" "$RESULT_EVAL"
          require_when_planned "checks-light" "$PLAN_LIGHT" "$RESULT_CHECKS_LIGHT"
          require_when_planned "lint" "$PLAN_LINT" "$RESULT_LINT"
          require_when_planned "packages" "$PLAN_PACKAGES" "$RESULT_PACKAGES"
          require_when_planned "hosts" "$PLAN_HOSTS" "$RESULT_HOSTS"
          require_when_planned "tests" "$PLAN_TESTS" "$RESULT_TESTS"

          exit $fail
