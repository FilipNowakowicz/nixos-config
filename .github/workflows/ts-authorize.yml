name: TS Fix DNS nameserver

# Transient incident-recovery helper: the homeserver-gcp AdGuard resolver moved
# from 100.103.234.89 to 100.103.234.88 after a forced tailnet re-registration,
# but the tailnet global nameserver override still points at the dead .89,
# breaking DNS tailnet-wide (and the homeserver's own heartbeat). Repoint it.
# Remove after recovery.
on:
  workflow_dispatch:
    inputs:
      nameserver:
        description: new global nameserver IP
        default: 100.103.234.88
        required: true
        type: string

permissions:
  contents: read

jobs:
  fix-dns:
    runs-on: ubuntu-latest
    steps:
      - name: Repoint tailnet global nameserver
        env:
          TS_API_KEY: ${{ secrets.TAILSCALE_API_KEY }}
          TS_TAILNET: ${{ secrets.TAILSCALE_TAILNET }}
          NS: ${{ inputs.nameserver }}
        run: |
          set -euo pipefail
          echo "=== current nameservers ==="
          curl -fsSL -u "$TS_API_KEY:" \
            "https://api.tailscale.com/api/v2/tailnet/$TS_TAILNET/dns/nameservers" | jq .
          echo "=== setting nameservers to [$NS] ==="
          curl -fsSL -u "$TS_API_KEY:" -X POST \
            "https://api.tailscale.com/api/v2/tailnet/$TS_TAILNET/dns/nameservers" \
            -H 'Content-Type: application/json' \
            --data "{\"dns\":[\"$NS\"]}" | jq .
          echo "=== confirm ==="
          curl -fsSL -u "$TS_API_KEY:" \
            "https://api.tailscale.com/api/v2/tailnet/$TS_TAILNET/dns/nameservers" | jq .
