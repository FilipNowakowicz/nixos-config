name: Deploy homeserver-gcp

on:
  workflow_dispatch:
    inputs:
      confirm_target:
        description: Type homeserver-gcp to deploy the homeserver
        required: true
        type: string
      validation_scope:
        description: Use fast only for small workflow/retry fixes after a full green run on the same commit lineage
        required: true
        default: full
        type: choice
        options:
          - full
          - fast

permissions:
  contents: read

concurrency:
  group: deploy-homeserver-gcp
  cancel-in-progress: false

jobs:
  # Heavy validation/build gates run on GitHub-hosted runners (ephemeral, large)
  # so they never touch the 4 GB homeserver-gcp host, which also runs the LGTM
  # stack + Vaultwarden + AdGuard. Building its closure on the host itself
  # OOM-thrashed the box catatonic and took the live services down (incident
  # 2026-06-07, #112). Only deploy + live verification, which genuinely need
  # tailnet reachability, run on the self-hosted runner.
  validate:
    if: |
      github.repository == 'FilipNowakowicz/nixos-config'
      && github.ref == 'refs/heads/main'
      && inputs.confirm_target == 'homeserver-gcp'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Reclaim runner disk space
        if: ${{ inputs.validation_scope == 'full' }}
        run: |
          sudo rm -rf /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true

      - uses: ./.github/actions/setup-nix
        with:
          enable-eval-cache: "true"
          enable-store-cache: "true"
          cache-key-suffix: deploy-homeserver-gcp
          store-cache-size-gb: "5"
          extra-nix-config: |
            system-features = nixos-test benchmark big-parallel kvm

      - name: Flake evaluation
        run: bash scripts/validate.sh flake-eval

      - name: Lightweight checks
        if: ${{ inputs.validation_scope == 'full' }}
        run: bash scripts/validate.sh light

      - name: Build homeserver-gcp closure
        if: ${{ inputs.validation_scope == 'full' }}
        run: bash scripts/validate.sh host homeserver-gcp

      - name: Build homeserver smoke test when KVM is available
        if: ${{ inputs.validation_scope == 'full' }}
        run: bash scripts/validate.sh smoke-homeserver-gcp

  # Tailnet-only work: reach the host to activate the closure and verify it.
  # deploy-rs builds the (incremental) closure on the host; the build-resource
  # seatbelt in hosts/homeserver-gcp/build-resource-limits.nix keeps that from
  # ever starving the live services again.
  deploy:
    needs: validate
    runs-on:
      - self-hosted
      - linux
      - x64
      - nixos
      - homeserver-gcp
      - homeserver-deploy
    environment: homeserver-gcp-deploy
    timeout-minutes: 60
    env:
      USE_BUILDER: "0"
    steps:
      # node24-native: the self-hosted github-runner (>=2.334) ships only
      # node24 in lib/externals, so a node20 action (checkout@v4) fails to exec.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Deploy homeserver-gcp
        # The validate job already ran the flake checks on GitHub-hosted
        # runners. Repeating them inside deploy-rs OOM-thrashes the 4 GB host.
        run: nix shell nixpkgs#deploy-rs -c deploy --skip-checks '.#homeserver-gcp'

      - name: Check registry-backed host drift
        env:
          HOST_DRIFT_INVENTORY_JSON: /etc/host-drift-inventory.json
        run: bash scripts/check-host-drift.sh homeserver-gcp

      - name: Check failed units
        run: |
          failed_units="$(
            ssh \
              -o BatchMode=yes \
              -o ConnectTimeout=10 \
              -o StrictHostKeyChecking=accept-new \
              user@homeserver-gcp \
              'systemctl --failed --no-legend --plain --no-pager'
          )"
          if [[ -n "$failed_units" ]]; then
            printf '%s\n' "$failed_units"
            exit 1
          fi
